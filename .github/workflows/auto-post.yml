name: Auto Post Crypto Content

on:
  schedule:
    # Slot 1: 6:00 AM Local = (6 - TIMEZONE_OFFSET_HOURS) UTC
    #   For IST (offset 5.5): 6:00 AM IST = 0:30 AM UTC
    - cron: '30 0 * * *'
    
    # Slot 2: 10:00 AM Local = (10 - TIMEZONE_OFFSET_HOURS) UTC
    #   For IST (offset 5.5): 10:00 AM IST = 4:30 AM UTC
    - cron: '30 4 * * *'
    
    # Slot 3: 2:00 PM Local = (14 - TIMEZONE_OFFSET_HOURS) UTC
    #   For IST (offset 5.5): 2:00 PM IST = 8:30 AM UTC
    - cron: '30 8 * * *'
    
    # Slot 4: 6:00 PM Local = (18 - TIMEZONE_OFFSET_HOURS) UTC
    #   For IST (offset 5.5): 6:00 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'
    
    # Slot 5: 10:00 PM Local = (22 - TIMEZONE_OFFSET_HOURS) UTC
    #   For IST (offset 5.5): 10:00 PM IST = 4:30 PM UTC
    - cron: '30 16 * * *'
  
  # Allow manual triggering from GitHub Actions tab
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Override post type (e.g. crypto_prices, crypto_news, etc.)'
        required: false
        default: ''

jobs:
  post-crypto-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run crypto bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          TIMEZONE_OFFSET_HOURS: ${{ secrets.TIMEZONE_OFFSET_HOURS }}
          POST_TYPE: ${{ github.event.inputs.post_type }}
        run: |
          python -m src.main
